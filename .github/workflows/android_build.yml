name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode release keystore
        if: github.event_name == 'push'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/keystore"
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty. Please add it in GitHub Secrets." >&2
            exit 1
          fi
          CLEAN_B64=$(printf "%s" "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')
          printf "%s" "$CLEAN_B64" | base64 -d > "$HOME/keystore/release.jks" 2>/dev/null || \
          printf "%s" "$CLEAN_B64" | base64 --decode > "$HOME/keystore/release.jks"
          test -s "$HOME/keystore/release.jks"
          echo "Keystore written to $HOME/keystore/release.jks"
          ls -l "$HOME/keystore/release.jks"

      - name: Export ANDROID_KEYSTORE_PATH
        if: github.event_name == 'push'
        run: echo "ANDROID_KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }}

      - name: Build Release APK (Signed)
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Release APK
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (jq)
        if: github.event_name == 'push'
        run: sudo apt-get update && sudo apt-get install -y jq  # 修复：安装jq依赖

      - name: Sync Release and Upload APK to Gitee
        if: github.event_name == 'push'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          TAG_NAME: v1.0.${{ github.run_number }}
          TARGET_BRANCH: ${{ github.ref_name }}  # 修复：动态获取当前分支
        run: |
          set -euo pipefail
          RELEASE_NAME="Release $TAG_NAME"
          RELEASE_BODY="自动同步自 GitHub Release。"
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          APK_FILENAME=$(basename "$APK_PATH")

          # 步骤1：检查Gitee上是否已存在该tag的Release
          echo "Checking if release exists for tag $TAG_NAME on Gitee..."
          RESPONSE=$(curl -s -w "%{http_code}" -o /tmp/gitee_release_check.json \
            "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$TAG_NAME?access_token=$GITEE_TOKEN")
          HTTP_CODE=$(tail -n1 /tmp/gitee_release_check.json)
          RELEASE_CONTENT=$(head -n -1 /tmp/gitee_release_check.json)

          if [ "$HTTP_CODE" = "200" ]; then
            # Release已存在，获取ID
            RELEASE_ID=$(echo "$RELEASE_CONTENT" | jq -r '.id')
            echo "Found existing release with ID: $RELEASE_ID"
          elif [ "$HTTP_CODE" = "404" ]; then
            # Release不存在，创建新的
            echo "Creating new release on Gitee..."
            JSON=$(jq -n \
              --arg tag_name "$TAG_NAME" \
              --arg name "$RELEASE_NAME" \
              --arg body "$RELEASE_BODY" \
              --arg target_commitish "$TARGET_BRANCH" \
              '{tag_name: $tag_name, name: $name, body: $body, prerelease: false, target_commitish: $target_commitish}')
          
            CREATE_RESP=$(curl -s -w "%{http_code}" -o /tmp/gitee_create_release.json \
              -X POST "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases?access_token=$GITEE_TOKEN" \
              -H "Content-Type: application/json; charset=utf-8"  # 修复：指定UTF-8编码
              -d "$JSON")
            CREATE_HTTP_CODE=$(tail -n1 /tmp/gitee_create_release.json)
            CREATE_CONTENT=$(head -n -1 /tmp/gitee_create_release.json)

            if [ "$CREATE_HTTP_CODE" != "201" ]; then
              echo "Failed to create Gitee release! Response: $CREATE_CONTENT"
              exit 1
            fi
            RELEASE_ID=$(echo "$CREATE_CONTENT" | jq -r '.id')
            echo "Created new release with ID: $RELEASE_ID"
          else
            echo "Unexpected error checking Gitee release! HTTP code: $HTTP_CODE, Response: $RELEASE_CONTENT"
            exit 1
          fi

          # 步骤2：重试确保Release ID有效（最多5次）
          for i in {1..5}; do
            CHECK_ID=$(curl -s "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/$RELEASE_ID?access_token=$GITEE_TOKEN" | jq -r '.id')
            if [ "$CHECK_ID" = "$RELEASE_ID" ] && [ "$CHECK_ID" != "null" ]; then
              break
            fi
            echo "Release ID $RELEASE_ID not ready yet, retrying in 3s... ($i/5)"
            sleep 3
          done

          if [ "$CHECK_ID" != "$RELEASE_ID" ] || [ "$CHECK_ID" = "null" ]; then
            echo "Release ID $RELEASE_ID is invalid after retries!"
            exit 1
          fi

          # 步骤3：上传APK到Gitee Release（修复：添加name参数，增加重试）
          echo "Uploading APK to Gitee release $RELEASE_ID..."
          UPLOAD_SUCCESS=false
          for i in {1..3}; do
            UPLOAD_RESP=$(curl -s -w "%{http_code}" -o /tmp/gitee_upload_apk.json \
              -X POST "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/$RELEASE_ID/assets?access_token=$GITEE_TOKEN" \
              -F "name=$APK_FILENAME"  # 修复：指定文件名
              -F "attachment=@$APK_PATH")
            UPLOAD_HTTP_CODE=$(tail -n1 /tmp/gitee_upload_apk.json)
            UPLOAD_CONTENT=$(head -n -1 /tmp/gitee_upload_apk.json)

            if [ "$UPLOAD_HTTP_CODE" = "201" ]; then
              echo "APK uploaded successfully to Gitee!"
              UPLOAD_SUCCESS=true
              break
            else
              echo "Upload attempt $i failed! HTTP code: $UPLOAD_HTTP_CODE, Response: $UPLOAD_CONTENT"
              sleep 5
            fi
          done

          if [ "$UPLOAD_SUCCESS" = false ]; then
            echo "Failed to upload APK to Gitee after 3 retries!"
            exit 1
          fi