name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode release keystore
        if: github.event_name == 'push'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/keystore"
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty. Please add it in GitHub Secrets." >&2
            exit 1
          fi
          CLEAN_B64=$(printf "%s" "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')
          printf "%s" "$CLEAN_B64" | base64 -d > "$HOME/keystore/release.jks" 2>/dev/null || \
          printf "%s" "$CLEAN_B64" | base64 --decode > "$HOME/keystore/release.jks"
          test -s "$HOME/keystore/release.jks"
          echo "Keystore written to $HOME/keystore/release.jks"
          ls -l "$HOME/keystore/release.jks"

      - name: Export ANDROID_KEYSTORE_PATH
        if: github.event_name == 'push'
        run: echo "ANDROID_KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }}

      - name: Build Release APK (Signed)
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Release APK
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync Release to Gitee
        if: github.event_name == 'push'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          TAG_NAME: v1.0.${{ github.run_number }}
        run: |
          RELEASE_NAME="Release v1.0.${{ github.run_number }}"
          RELEASE_BODY="自动同步自 GitHub Release。"

          curl -X POST "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases" \
            -H "Content-Type: application/json" \
            -d '{
              "access_token": "'$GITEE_TOKEN'",
              "tag_name": "'$TAG_NAME'",
              "name": "'$RELEASE_NAME'",
              "body": "'$RELEASE_BODY'",
              "prerelease": false
            }'
