name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode release keystore
        if: github.event_name == 'push'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/keystore"
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty. Please add it in GitHub Secrets." >&2
            exit 1
          fi
          CLEAN_B64=$(printf "%s" "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')
          printf "%s" "$CLEAN_B64" | base64 -d > "$HOME/keystore/release.jks" 2>/dev/null || \
          printf "%s" "$CLEAN_B64" | base64 --decode > "$HOME/keystore/release.jks"
          test -s "$HOME/keystore/release.jks"
          echo "Keystore written to $HOME/keystore/release.jks"
          ls -l "$HOME/keystore/release.jks"

      - name: Export ANDROID_KEYSTORE_PATH
        if: github.event_name == 'push'
        run: echo "ANDROID_KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (Signed)
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }}

      - name: Upload Release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Release APK
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag to Gitee
        if: github.event_name == 'push'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "ci-bot"
          git remote add gitee https://mayixuanemail-web:${GITEE_TOKEN}@gitee.com/mayixuanemail-web/lulema.git
          git fetch origin v1.0.${{ github.run_number }} --tags || true
          git push gitee v1.0.${{ github.run_number }}

      - name: Install jq (修复依赖缺失)
        if: github.event_name == 'push'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Upload APK to Gitee Release
        if: github.event_name == 'push'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: mayixuanemail-web
          GITEE_REPO: lulema
        run: |
          set -euo pipefail  # 严格模式，任何错误立即退出
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          TAG_NAME="v1.0.${{ github.run_number }}"
          FILE_NAME="app-release.apk"
          API_BASE="https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO"
          
          # 1. 校验APK文件是否存在且非空
          if [ ! -f "$APK_PATH" ]; then
            echo "错误：APK文件不存在！路径：$APK_PATH"
            ls -l app/build/outputs/apk/release/ || true  # 打印目录内容排查
            exit 1
          fi
          if [ ! -s "$APK_PATH" ]; then
            echo "错误：APK文件为空！路径：$APK_PATH"
            exit 1
          fi
          
          # 2. 获取release_id（带重试）
          RELEASE_ID=""
          for i in {1..3}; do
            echo "第 $i 次尝试获取Release ID（tag: $TAG_NAME）..."
            RELEASE_RESP=$(curl -s -w "%{http_code}" -o /tmp/release.json \
              "$API_BASE/releases/tags/$TAG_NAME?access_token=$GITEE_TOKEN")
            HTTP_CODE=$(tail -n1 /tmp/release.json)
            RELEASE_JSON=$(head -n -1 /tmp/release.json)
          
            if [ "$HTTP_CODE" = "200" ]; then
              RELEASE_ID=$(echo "$RELEASE_JSON" | jq -r '.id')
              if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
                echo "找到Release ID: $RELEASE_ID"
                break
              fi
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "Release不存在，创建新Release..."
              # 使用当前分支名而非commit id，避免分支不匹配
              TARGET_BRANCH=${{ github.ref_name }}
              CREATE_RESP=$(curl -s -w "%{http_code}" -o /tmp/create_release.json \
                -X POST "$API_BASE/releases?access_token=$GITEE_TOKEN" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "tag_name=$TAG_NAME" \
                -d "name=$TAG_NAME" \
                -d "body=Auto release from GitHub Actions" \
                -d "target_commitish=$TARGET_BRANCH")
              CREATE_HTTP_CODE=$(tail -n1 /tmp/create_release.json)
              CREATE_JSON=$(head -n -1 /tmp/create_release.json)
          
              if [ "$CREATE_HTTP_CODE" = "201" ]; then
                RELEASE_ID=$(echo "$CREATE_JSON" | jq -r '.id')
                echo "创建Release成功，ID: $RELEASE_ID"
                break
              else
                echo "创建Release失败！HTTP状态码：$CREATE_HTTP_CODE，响应：$CREATE_JSON"
                sleep 3
              fi
            else
              echo "获取Release失败！HTTP状态码：$HTTP_CODE，响应：$RELEASE_JSON"
              sleep 3
            fi
          done
          
          # 3. 校验Release ID
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "错误：无法获取/创建Gitee Release ID！"
            exit 1
          fi
          
          # 4. 删除同名旧附件（避免冲突）
          echo "检查并删除同名旧附件..."
          ASSETS_RESP=$(curl -s "$API_BASE/releases/$RELEASE_ID/assets?access_token=$GITEE_TOKEN")
          if echo "$ASSETS_RESP" | jq . >/dev/null 2>&1; then
            ASSET_ID=$(echo "$ASSETS_RESP" | jq -r ".[] | select(.name == \"$FILE_NAME\") | .id")
            if [ -n "$ASSET_ID" ] && [ "$ASSET_ID" != "null" ]; then
              DELETE_RESP=$(curl -s -w "%{http_code}" -X DELETE "$API_BASE/releases/$RELEASE_ID/assets/$ASSET_ID?access_token=$GITEE_TOKEN")
              if [ "$DELETE_RESP" = "204" ] || echo "$DELETE_RESP" | jq -r '.message' = "success"; then
                echo "删除旧附件成功（ID: $ASSET_ID）"
              else
                echo "删除旧附件失败，响应：$DELETE_RESP"
              fi
            fi
          fi
          
          # 5. 上传APK（核心修复：添加name参数+校验状态）
          echo "开始上传APK到Gitee Release..."
          UPLOAD_SUCCESS=false
          for i in {1..3}; do
            UPLOAD_RESP=$(curl -s -w "%{http_code}" -o /tmp/upload_apk.json \
              -X POST "$API_BASE/releases/$RELEASE_ID/assets?access_token=$GITEE_TOKEN" \
              -F "name=$FILE_NAME" \  # 关键：指定文件名
              -F "attachment=@$APK_PATH;type=application/vnd.android.package-archive")
            UPLOAD_HTTP_CODE=$(tail -n1 /tmp/upload_apk.json)
            UPLOAD_JSON=$(head -n -1 /tmp/upload_apk.json)
          
            if [ "$UPLOAD_HTTP_CODE" = "201" ]; then
              echo "APK上传成功！响应：$UPLOAD_JSON"
              UPLOAD_SUCCESS=true
              break
            else
              echo "第 $i 次上传失败！HTTP状态码：$UPLOAD_HTTP_CODE，响应：$UPLOAD_JSON"
              sleep 5
            fi
          done
          
          # 6. 最终校验上传结果
          if [ "$UPLOAD_SUCCESS" = false ]; then
            echo "错误：APK上传失败（3次重试均失败）！"
            exit 1
          fi
          
          echo "✅ APK成功上传到Gitee Release（tag: $TAG_NAME）！"