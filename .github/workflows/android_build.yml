name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.create_release.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode release keystore
        if: github.event_name == 'push'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/keystore"
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty. Please add it in GitHub Secrets." >&2
            exit 1
          fi
          CLEAN_B64=$(printf "%s" "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')
          printf "%s" "$CLEAN_B64" | base64 -d > "$HOME/keystore/release.jks" 2>/dev/null || \
          printf "%s" "$CLEAN_B64" | base64 --decode > "$HOME/keystore/release.jks"
          test -s "$HOME/keystore/release.jks"
          echo "Keystore written to $HOME/keystore/release.jks"
          ls -l "$HOME/keystore/release.jks"

      - name: Export ANDROID_KEYSTORE_PATH
        if: github.event_name == 'push'
        run: echo "ANDROID_KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (Signed)
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease -PversionCode=${{ github.run_number }}
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release-v1.0.${{ github.run_number }}.apk

      - name: Upload Release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-v1.0.${{ github.run_number }}.apk

      - name: Release APK
        id: create_release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "最后提交信息为：${{ github.event.head_commit.message }}"
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release-v1.0.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: 检出仓库全量历史
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: 全量同步代码、分支、Tags到Gitee镜像
        uses: wearerequired/git-mirror-action@v1
        with:
          source-repo: "https://github.com/mayixuanemail-web/lulema.git"
          destination-repo: "https://mayixuanemail-web:${{ secrets.GITEE_TOKEN }}@gitee.com/mayixuanemail-web/lulema.git"
          force-push: true

      - name: 同步Release标题、说明和APK附件到Gitee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: v1.0.${{ github.run_number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # ==============================
          # 初始化与安全设置
          # ==============================
          set -euo pipefail  # 关键：出错立即停止
          shopt -s nullglob   # 处理空文件列表
          WORK_DIR=$(mktemp -d)
          cd "$WORK_DIR"
          echo "✅ 工作目录初始化完成: $WORK_DIR"
          
          # 清理函数（确保脚本结束时清理临时文件）
          cleanup() {
            cd /
            rm -rf "$WORK_DIR"
            echo "🧹 临时文件已清理"
          }
          trap cleanup EXIT
          
          # ==============================
          # 1. 从GitHub获取Release完整信息
          # ==============================
          echo "📥 正在获取GitHub Release完整信息..."
          gh release view "$RELEASE_TAG" \
            --repo "mayixuanemail-web/lulema" \
            --json name,body,tagName,assets > release_info.json
          
          # 解析JSON数据
          RELEASE_NAME=$(jq -r '.name' release_info.json)
          RELEASE_BODY=$(jq -r '.body' release_info.json)
          ASSET_COUNT=$(jq '.assets | length' release_info.json)
          
          # 处理空描述
          if [ -z "$RELEASE_BODY" ] || [ "$RELEASE_BODY" == "null" ]; then
            RELEASE_BODY="action自动创建"
            echo "ℹ️  检测到空描述，已填充默认值"
          fi
          
          echo "✅ 获取成功："
          echo "   标签: $RELEASE_TAG"
          echo "   标题: $RELEASE_NAME"
          echo "   分支: $DEFAULT_BRANCH"
          echo "   附件数量: $ASSET_COUNT"
          
          # ==============================
          # 2. 在Gitee创建Release
          # ==============================
          echo "🚀 正在创建Gitee Release..."
          GITEE_API="https://gitee.com/api/v5/repos/mayixuanemail-web/lulema/releases"
          
          # 先删除已存在的Release（如果有）
          EXISTING=$(curl -s -H "Authorization: token $GITEE_TOKEN" "$GITEE_API/tags/$RELEASE_TAG" || true)
          if [ "$(echo "$EXISTING" | jq -r '.id' 2>/dev/null)" != "null" ]; then
            EXISTING_ID=$(echo "$EXISTING" | jq -r '.id')
            echo "⚠️  删除已存在的Release (ID: $EXISTING_ID)..."
            curl -s -X DELETE -H "Authorization: token $GITEE_TOKEN" "$GITEE_API/$EXISTING_ID"
            sleep 2  # 等待删除生效
          fi
          
          # 用Python生成完美JSON（比jq更可靠）
          cat > create_release.py << 'EOF'
          import json
          import sys
          
          with open('release_info.json', 'r', encoding='utf-8') as f:
              data = json.load(f)
          
          body = data.get('body', '')
          if not body or body == 'null':
              body = 'action自动创建'
          
          payload = {
              'tag_name': sys.argv[1],
              'name': data.get('name', sys.argv[1]),
              'body': body,
              'target_commitish': sys.argv[2],
              'prerelease': False,
              'draft': False
          }
          
          with open('request.json', 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False)
          EOF
          
          python3 create_release.py "$RELEASE_TAG" "$DEFAULT_BRANCH"
          
          # 发送请求
          CREATE_RESULT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Authorization: token $GITEE_TOKEN" \
            -H "Content-Type: application/json" \
            -d @request.json \
            "$GITEE_API")
          
          # 解析响应
          HTTP_STATUS=$(echo "$CREATE_RESULT" | tail -n 1 | sed 's/HTTP_STATUS://')
          RESP_BODY=$(echo "$CREATE_RESULT" | sed '$d')
          
          if [ "$HTTP_STATUS" != "201" ] && [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ 创建Release失败 (状态码: $HTTP_STATUS)"
            echo "响应内容: $RESP_BODY"
            exit 1
          fi
          
          GITEE_RELEASE_ID=$(echo "$RESP_BODY" | jq -r '.id')
          if [ "$GITEE_RELEASE_ID" == "null" ]; then
            echo "❌ 无法解析Release ID"
            echo "响应内容: $RESP_BODY"
            exit 1
          fi
          
          echo "✅ Gitee Release创建成功（ID: $GITEE_RELEASE_ID）"
          
          # ==============================
          # 3. 上传APK附件
          # ==============================
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "🎉 同步完成（无附件）"
            echo "   访问：https://gitee.com/mayixuanemail-web/lulema/releases"
            exit 0
          fi
          
          echo "📦 开始上传附件..."
          
          # 遍历每个附件
          jq -c '.assets[]' release_info.json | while read -r asset; do
            ASSET_NAME=$(echo "$asset" | jq -r '.name')
            ASSET_CONTENT_TYPE=$(echo "$asset" | jq -r '.contentType')
            ASSET_SIZE=$(echo "$asset" | jq -r '.size')
          
            echo "======================"
            echo "   处理: $ASSET_NAME"
            echo "   大小: $ASSET_SIZE 字节"
          
            # 下载（带重试）
            echo "   🔽 正在下载..."
            for i in {1..3}; do
              if gh release download "$RELEASE_TAG" \
                --repo "mayixuanemail-web/lulema" \
                --pattern "$ASSET_NAME" \
                --output "$ASSET_NAME" \
                --clobber 2>/dev/null; then
                break
              fi
              echo "   下载失败，重试 $i/3..."
              sleep 2
            done
          
            # 验证文件
            if [ ! -f "$ASSET_NAME" ]; then
              echo "   ❌ 下载失败，跳过此文件"
              continue
            fi
          
            DOWNLOADED_SIZE=$(stat -c%s "$ASSET_NAME" 2>/dev/null || stat -f%z "$ASSET_NAME")
            if [ "$DOWNLOADED_SIZE" != "$ASSET_SIZE" ]; then
              echo "   ⚠️  文件大小不匹配 (期望: $ASSET_SIZE, 实际: $DOWNLOADED_SIZE)"
            else
              echo "   ✅ 下载验证通过"
            fi
          
            # 上传（带重试）
            echo "   🔼 正在上传..."
            for i in {1..3}; do
              UPLOAD_RESULT=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST \
                -H "Authorization: token $GITEE_TOKEN" \
                -F "file=@$ASSET_NAME;type=$ASSET_CONTENT_TYPE" \
                -F "name=$ASSET_NAME" \
                "https://gitee.com/api/v5/repos/mayixuanemail-web/lulema/releases/$GITEE_RELEASE_ID/assets")
          
              UPLOAD_STATUS=$(echo "$UPLOAD_RESULT" | tail -n 1 | sed 's/HTTP_STATUS://')
              UPLOAD_BODY=$(echo "$UPLOAD_RESULT" | sed '$d')
          
              if [ "$UPLOAD_STATUS" = "201" ] || [ "$UPLOAD_STATUS" = "200" ]; then
                echo "   ✅ 上传成功！"
                break
              fi
          
              echo "   上传失败 (状态码: $UPLOAD_STATUS)，重试 $i/3..."
              sleep 3
            done
          
            # 清理
            rm -f "$ASSET_NAME"
          done
          
          echo "======================"
          echo "🎉 全部同步完成！"
          echo "   访问地址：https://gitee.com/mayixuanemail-web/lulema/releases"