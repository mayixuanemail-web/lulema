name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.create_release.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode release keystore
        if: github.event_name == 'push'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/keystore"
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty. Please add it in GitHub Secrets." >&2
            exit 1
          fi
          CLEAN_B64=$(printf "%s" "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')
          printf "%s" "$CLEAN_B64" | base64 -d > "$HOME/keystore/release.jks" 2>/dev/null || \
          printf "%s" "$CLEAN_B64" | base64 --decode > "$HOME/keystore/release.jks"
          test -s "$HOME/keystore/release.jks"
          echo "Keystore written to $HOME/keystore/release.jks"
          ls -l "$HOME/keystore/release.jks"

      - name: Export ANDROID_KEYSTORE_PATH
        if: github.event_name == 'push'
        run: echo "ANDROID_KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (Signed)
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease -PversionCode=${{ github.run_number }}
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release-v1.0.${{ github.run_number }}.apk

      - name: Upload Release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-v1.0.${{ github.run_number }}.apk

      - name: Release APK
        id: create_release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "最后提交信息为：${{ github.event.head_commit.message }}"
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release-v1.0.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: 检出仓库全量历史
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: 全量同步代码、分支、Tags到Gitee镜像
        uses: wearerequired/git-mirror-action@v1
        with:
          source-repo: "https://github.com/mayixuanemail-web/lulema.git"
          destination-repo: "https://mayixuanemail-web:${{ secrets.GITEE_TOKEN }}@gitee.com/mayixuanemail-web/lulema.git"
          force-push: true

      - name: 同步Release标题、说明和APK附件到Gitee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: v1.0.${{ github.run_number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # --------------------------
          # 1. 从GitHub获取Release完整信息
          # --------------------------
          echo "📥 正在获取GitHub Release完整信息..."
          gh release view "$RELEASE_TAG" \
            --repo "mayixuanemail-web/lulema" \
            --json name,body,tagName,assets > release_info.json
          
          # 打印完整信息用于调试
          echo "🔍 完整Release信息："
          cat release_info.json
          
          # 解析JSON数据，处理空描述和特殊字符
          RELEASE_NAME=$(jq -r '.name' release_info.json)
          RELEASE_BODY=$(jq -r '.body' release_info.json)
          
          # 处理空描述
          if [ -z "$RELEASE_BODY" ] || [ "$RELEASE_BODY" == "null" ]; then
            RELEASE_BODY="action自动创建"
            echo "ℹ️  检测到空描述，已填充默认值"
          fi
          
          # 统计附件数量
          ASSET_COUNT=$(jq '.assets | length' release_info.json)
          echo "✅ 获取成功："
          echo "   标签: $RELEASE_TAG"
          echo "   标题: $RELEASE_NAME"
          echo "   分支: $DEFAULT_BRANCH"
          echo "   附件数量: $ASSET_COUNT"
          
          # --------------------------
          # 2. 在Gitee创建Release
          # --------------------------
          echo "🚀 正在创建Gitee Release..."
          GITEE_API="https://gitee.com/api/v5/repos/mayixuanemail-web/lulema/releases"
          
          # 先检查是否已存在同名Release，存在则删除（避免冲突）
          EXISTING=$(curl -s -H "Authorization: token $GITEE_TOKEN" \
            "$GITEE_API/tags/$RELEASE_TAG" || true)
          
          if [ "$(echo "$EXISTING" | jq -r '.id' 2>/dev/null)" != "null" ]; then
            echo "⚠️  发现已存在的Release，正在删除..."
            curl -s -X DELETE -H "Authorization: token $GITEE_TOKEN" \
              "$GITEE_API/$(echo "$EXISTING" | jq -r '.id')"
          fi
          
          # 创建新Release（修复换行符/特殊字符导致的JSON格式错误）
          CREATE_RESULT=$(curl -s -X POST \
            -H "Authorization: token $GITEE_TOKEN" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "tag_name": "$RELEASE_TAG",
            "name": "$RELEASE_NAME",
            "body": $(printf '%s' "$RELEASE_BODY" | jq -R -s .),
            "target_commitish": "$DEFAULT_BRANCH",
            "prerelease": false,
            "draft": false
          }
          EOF
          )
          
          # 检查创建是否成功
          if [ "$(echo "$CREATE_RESULT" | jq -r '.id' 2>/dev/null)" == "null" ]; then
            echo "❌ 创建Release失败：$CREATE_RESULT"
            exit 1
          fi
          
          GITEE_RELEASE_ID=$(echo "$CREATE_RESULT" | jq -r '.id')
          echo "✅ Gitee Release创建成功（ID: $GITEE_RELEASE_ID）"
          
          # --------------------------
          # 3. 上传APK附件到Gitee（核心修复）
          # --------------------------
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "ℹ️  没有检测到附件，跳过上传步骤"
            echo "🎉 全部同步完成！"
            echo "   访问地址：https://gitee.com/mayixuanemail-web/lulema/releases"
            exit 0
          fi
          
          echo "📦 开始上传附件..."
          
          # 修复：改用while read循环，避免特殊字符导致的循环异常
          jq -c '.assets[]' release_info.json | while read -r asset; do
            ASSET_NAME=$(echo "$asset" | jq -r '.name')
            ASSET_CONTENT_TYPE=$(echo "$asset" | jq -r '.contentType')
            ASSET_SIZE=$(echo "$asset" | jq -r '.size')
          
            echo "======================"
            echo "   处理附件: $ASSET_NAME"
            echo "   大小: $ASSET_SIZE 字节"
            echo "   类型: $ASSET_CONTENT_TYPE"
          
            # 下载附件
            echo "   🔽 正在下载..."
            gh release download "$RELEASE_TAG" \
              --repo "mayixuanemail-web/lulema" \
              --pattern "$ASSET_NAME" \
              --output "$ASSET_NAME" \
              --clobber
          
            # 检查文件是否下载成功
            if [ ! -f "$ASSET_NAME" ]; then
              echo "   ❌ 下载失败，文件不存在"
              continue
            fi
          
            # 检查文件大小
            DOWNLOADED_SIZE=$(stat -c%s "$ASSET_NAME" 2>/dev/null || stat -f%z "$ASSET_NAME")
            echo "   ✅ 下载完成，本地文件大小: $DOWNLOADED_SIZE 字节"
          
            # 上传到Gitee
            echo "   🔼 正在上传到Gitee..."
            UPLOAD_RESULT=$(curl -s -w "HTTP_STATUS:%{http_code}" -X POST \
              -H "Authorization: token $GITEE_TOKEN" \
              -F "file=@$ASSET_NAME;type=$ASSET_CONTENT_TYPE" \
              -F "name=$ASSET_NAME" \
              "https://gitee.com/api/v5/repos/mayixuanemail-web/lulema/releases/$GITEE_RELEASE_ID/assets")
          
            # 分离响应体和状态码
            HTTP_STATUS=$(echo "$UPLOAD_RESULT" | sed -n 's/.*HTTP_STATUS://p')
            RESP_BODY=$(echo "$UPLOAD_RESULT" | sed 's/HTTP_STATUS:.*//')
          
            # 检查上传结果
            if [ "$HTTP_STATUS" -eq 201 ] && [ "$(echo "$RESP_BODY" | jq -r '.id' 2>/dev/null)" != "null" ]; then
              echo "   ✅ 上传成功！"
            else
              echo "   ⚠️  上传失败"
              echo "   状态码: $HTTP_STATUS"
              echo "   响应内容: $RESP_BODY"
            fi
          
            # 清理临时文件
            rm -f "$ASSET_NAME"
            echo "   🧹 临时文件已清理"
          done
          
          echo "======================"
          echo "🎉 全部同步完成！"
          echo "   访问地址：https://gitee.com/mayixuanemail-web/lulema/releases"