name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode release keystore
        if: github.event_name == 'push'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/keystore"
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty. Please add it in GitHub Secrets." >&2
            exit 1
          fi
          CLEAN_B64=$(printf "%s" "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')
          printf "%s" "$CLEAN_B64" | base64 -d > "$HOME/keystore/release.jks" 2>/dev/null || \
          printf "%s" "$CLEAN_B64" | base64 --decode > "$HOME/keystore/release.jks"
          test -s "$HOME/keystore/release.jks"
          echo "Keystore written to $HOME/keystore/release.jks"
          ls -l "$HOME/keystore/release.jks"

      - name: Export ANDROID_KEYSTORE_PATH
        if: github.event_name == 'push'
        run: echo "ANDROID_KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (Signed)
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }}

      - name: Upload Release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Release APK
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag to Gitee
        if: github.event_name == 'push'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "ci-bot"
          git remote add gitee https://mayixuanemail-web:${GITEE_TOKEN}@gitee.com/mayixuanemail-web/lulema.git
          git fetch origin v1.0.${{ github.run_number }} --tags || true
          git push gitee v1.0.${{ github.run_number }}

      - name: Install jq (修复依赖缺失)
        if: github.event_name == 'push'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Upload APK to Gitee Release
        if: github.event_name == 'push'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: mayixuanemail-web
          GITEE_REPO: lulema
        run: |
          set -euo pipefail
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          TAG_NAME="v1.0.${{ github.run_number }}"
          FILE_NAME="app-release.apk"
          # 1. 先打印关键变量，排查拼接错误
          echo "=== 调试信息 ==="
          echo "GITEE_OWNER: $GITEE_OWNER"
          echo "GITEE_REPO: $GITEE_REPO"
          echo "TAG_NAME: $TAG_NAME"
          echo "API_BASE: https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO"
          echo "APK_PATH: $APK_PATH"
          ls -l "$APK_PATH" || echo "APK文件不存在"
          echo "================="
          
          # 2. 修复curl命令：改用单条命令获取响应+状态码，避免解析错误
          RELEASE_ID=""
          API_URL="https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO"
          # 给curl添加超时、重试、详细日志参数
          CURL_OPTS="-s --connect-timeout 30 --max-time 60 --retry 3 --retry-delay 5"
          
          # 3. 重新实现获取/创建Release逻辑
          for i in {1..3}; do
            echo "第 $i 次尝试获取Release（tag: $TAG_NAME）..."
            # 修复：Token放在请求头，而非URL中（避免特殊字符问题）
            RESP=$(curl $CURL_OPTS -w "HTTP_STATUS:%{http_code}" \
              -H "Authorization: token $GITEE_TOKEN" \
              "$API_URL/releases/tags/$TAG_NAME")
            # 分离响应体和状态码
            HTTP_CODE=$(echo "$RESP" | sed -e '$!{N;D;}' | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
            RESP_BODY=$(echo "$RESP" | sed 's/HTTP_STATUS:[0-9]*$//')
          
            echo "HTTP_CODE: $HTTP_CODE"
            echo "RESP_BODY: $RESP_BODY"
          
            if [ "$HTTP_CODE" = "200" ]; then
              RELEASE_ID=$(echo "$RESP_BODY" | jq -r '.id')
              if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
                echo "找到Release ID: $RELEASE_ID"
                break
              fi
            elif [ "$HTTP_CODE" = "404" ]; then
              echo "Release不存在，创建新Release..."
              TARGET_BRANCH=master
              # 修复：POST请求用表单格式，Token放请求头
              CREATE_RESP=$(curl $CURL_OPTS -w "HTTP_STATUS:%{http_code}" \
                -X POST \
                -H "Authorization: token $GITEE_TOKEN" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                -d "tag_name=$TAG_NAME" \
                -d "name=$TAG_NAME" \
                -d "body=Auto release from GitHub Actions" \
                -d "target_commitish=$TARGET_BRANCH" \
                "$API_URL/releases")
              CREATE_HTTP_CODE=$(echo "$CREATE_RESP" | sed -e '$!{N;D;}' | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
              CREATE_BODY=$(echo "$CREATE_RESP" | sed 's/HTTP_STATUS:[0-9]*$//')
          
              echo "创建Release HTTP_CODE: $CREATE_HTTP_CODE"
              echo "创建Release RESP: $CREATE_BODY"
          
              if [ "$CREATE_HTTP_CODE" = "201" ]; then
                RELEASE_ID=$(echo "$CREATE_BODY" | jq -r '.id')
                echo "创建Release成功，ID: $RELEASE_ID"
                break
              else
                echo "创建Release失败，重试中..."
                sleep 3
              fi
            else
              echo "获取Release失败（HTTP_CODE: $HTTP_CODE），重试中..."
              sleep 3
            fi
          done
          
          # 4. 校验Release ID
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "错误：无法获取/创建Gitee Release ID！"
            exit 1
          fi
          
          # 5. 删除旧附件（简化版）
          echo "检查并删除同名旧附件..."
          ASSETS_RESP=$(curl $CURL_OPTS -H "Authorization: token $GITEE_TOKEN" "$API_URL/releases/$RELEASE_ID/assets")
          if echo "$ASSETS_RESP" | jq . >/dev/null 2>&1; then
            ASSET_ID=$(echo "$ASSETS_RESP" | jq -r ".[] | select(.name == \"$FILE_NAME\") | .id")
            if [ "$ASSET_ID" != "null" ] && [ -n "$ASSET_ID" ]; then
              curl $CURL_OPTS -X DELETE -H "Authorization: token $GITEE_TOKEN" "$API_URL/releases/$RELEASE_ID/assets/$ASSET_ID"
              echo "删除旧附件（ID: $ASSET_ID）"
            fi
          fi
          
          # 6. 上传APK（核心修复：Token放请求头+稳定的curl参数）
          echo "开始上传APK..."
          UPLOAD_SUCCESS=false
          for i in {1..3}; do
            UPLOAD_RESP=$(curl $CURL_OPTS -w "HTTP_STATUS:%{http_code}" \
              -X POST \
              -H "Authorization: token $GITEE_TOKEN" \
              -F "name=$FILE_NAME" \
              -F "attachment=@$APK_PATH;type=application/vnd.android.package-archive" \
              "$API_URL/releases/$RELEASE_ID/assets")
            UPLOAD_HTTP_CODE=$(echo "$UPLOAD_RESP" | sed -e '$!{N;D;}' | grep -oE 'HTTP_STATUS:[0-9]+' | cut -d: -f2)
            UPLOAD_BODY=$(echo "$UPLOAD_RESP" | sed 's/HTTP_STATUS:[0-9]*$//')
          
            echo "上传APK第$i次尝试：HTTP_CODE=$UPLOAD_HTTP_CODE，RESP=$UPLOAD_BODY"
            if [ "$UPLOAD_HTTP_CODE" = "201" ]; then
              echo "APK上传成功！"
              UPLOAD_SUCCESS=true
              break
            else
              sleep 5
            fi
          done
          
          if [ "$UPLOAD_SUCCESS" = false ]; then
            echo "错误：APK上传失败！"
            exit 1
          fi
          
          echo "✅ APK成功上传到Gitee Release（tag: $TAG_NAME）！"
              done
              
              # 6. 最终校验上传结果
              if [ "$UPLOAD_SUCCESS" = false ]; then
                echo "错误：APK上传失败（3次重试均失败）！"
                exit 1
              fi
              
              echo "✅ APK成功上传到Gitee Release（tag: $TAG_NAME）！"