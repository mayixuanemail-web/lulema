name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

# 增加权限配置，确保 GITHUB_TOKEN 有权限发版
permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }}

    - name: Build Release APK (Unsigned)
      run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    # 使用更现代的 Action 来发布 Release，并处理未签名 APK
    - name: Release APK
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push' # 仅在 push 时发布，由 PR 触发时不发布
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/release/app-release-unsigned.apk
          app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Sync Release to Gitee
      if: github.event_name == 'push'
      env:
        GITEE_TOKEN: 0663baeb420216e2d8b069b619cd4cf1
        GITEE_REPO: mayixuanemail-web/lulema
        GITEE_OWNER: mayixuanemail-web
        TAG_NAME: v1.0.${{ github.run_number }}
      run: |
        # 获取 Release 信息
        RELEASE_NAME="Release v1.0.${{ github.run_number }}"
        RELEASE_BODY="自动同步自 GitHub Release。"
        # 上传 APK 到 Gitee Release
        # 1. 创建 Release
        curl -X POST "https://gitee.com/api/v5/repos/$GITEE_REPO/releases" \
          -H "Content-Type: application/json" \
          -d '{
            "access_token": "'$GITEE_TOKEN'",
            "tag_name": "'$TAG_NAME'",
            "name": "'$RELEASE_NAME'",
            "body": "'$RELEASE_BODY'",
            "prerelease": false
          }'
        # 2. 上传 APK 附件（需先将 APK 上传到公开可访问的 URL 或 OSS，或用 Gitee Release 附件 API）
        # 这里只同步 Release 元数据，附件上传需额外处理。
