name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.create_release.outputs.tag_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode release keystore
        if: github.event_name == 'push'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/keystore"
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty. Please add it in GitHub Secrets." >&2
            exit 1
          fi
          CLEAN_B64=$(printf "%s" "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')
          printf "%s" "$CLEAN_B64" | base64 -d > "$HOME/keystore/release.jks" 2>/dev/null || \
          printf "%s" "$CLEAN_B64" | base64 --decode > "$HOME/keystore/release.jks"
          test -s "$HOME/keystore/release.jks"
          echo "Keystore written to $HOME/keystore/release.jks"
          ls -l "$HOME/keystore/release.jks"

      - name: Export ANDROID_KEYSTORE_PATH
        if: github.event_name == 'push'
        run: echo "ANDROID_KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK (Signed)
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease -PversionCode=${{ github.run_number }}
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/app-release-v1.0.${{ github.run_number }}.apk

      - name: Upload Release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release-v1.0.${{ github.run_number }}.apk

      - name: Release APK
        id: create_release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: "最后提交信息为：${{ github.event.head_commit.message }}"
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release-v1.0.${{ github.run_number }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - name: 检出仓库全量历史
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: 全量同步代码、分支、Tags到Gitee镜像
        uses: wearerequired/git-mirror-action@v1
        with:
          source-repo: "https://github.com/mayixuanemail-web/lulema.git"
          destination-repo: "https://mayixuanemail-web:${{ secrets.GITEE_TOKEN }}@gitee.com/mayixuanemail-web/lulema.git"
          force-push: true

      - name: 同步Release标题、说明和APK附件到Gitee
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: v1.0.${{ github.run_number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          # ==============================
          # 初始化与安全设置
          # ==============================
          set -euo pipefail
          shopt -s nullglob
          WORK_DIR=$(mktemp -d)
          cd "$WORK_DIR"
          
          cleanup() {
            cd /
            rm -rf "$WORK_DIR"
            echo "🧹 临时文件已清理"
          }
          trap cleanup EXIT
          
          # ==============================
          # 1. 获取GitHub Release信息
          # ==============================
          echo "📥 获取GitHub Release信息..."
          gh release view "$RELEASE_TAG" \
            --repo "mayixuanemail-web/lulema" \
            --json name,body,tagName,assets > release_info.json
          
          RELEASE_NAME=$(jq -r '.name' release_info.json)
          RELEASE_BODY=$(jq -r '.body' release_info.json)
          ASSET_COUNT=$(jq '.assets | length' release_info.json)
          
          if [ -z "$RELEASE_BODY" ] || [ "$RELEASE_BODY" == "null" ]; then
            RELEASE_BODY="action自动创建"
          fi
          
          # ==============================
          # 2. 重新获取有效的Gitee Release ID（核心修复）
          # ==============================
          echo "🚀 处理Gitee Release..."
          GITEE_API="https://gitee.com/api/v5/repos/mayixuanemail-web/lulema"
          
          # 删除旧Release
          EXISTING=$(curl -s -H "Authorization: token $GITEE_TOKEN" "$GITEE_API/releases/tags/$RELEASE_TAG" || true)
          if [ "$(echo "$EXISTING" | jq -r '.id' 2>/dev/null)" != "null" ]; then
            echo "⚠️ 删除旧Release: $(echo "$EXISTING" | jq -r '.id')"
            curl -s -X DELETE -H "Authorization: token $GITEE_TOKEN" "$GITEE_API/releases/$(echo "$EXISTING" | jq -r '.id')"
            sleep 3
          fi
          
          # 创建Release
          echo "📝 创建Gitee Release..."
          CREATE_PAYLOAD=$(jq -n \
            --arg tag "$RELEASE_TAG" \
            --arg name "$RELEASE_NAME" \
            --arg body "$RELEASE_BODY" \
            --arg branch "$DEFAULT_BRANCH" \
            '{
              "tag_name": $tag,
              "name": $name,
              "body": $body,
              "target_commitish": $branch,
              "prerelease": false,
              "draft": false
            }')
          
          CREATE_RESULT=$(curl -s -X POST \
            -H "Authorization: token $GITEE_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$CREATE_PAYLOAD" \
            "$GITEE_API/releases")
          
          # 验证创建结果
          if echo "$CREATE_RESULT" | jq -e '.id' >/dev/null 2>&1; then
            GITEE_RELEASE_ID=$(echo "$CREATE_RESULT" | jq -r '.id')
            echo "✅ 创建Release成功 (ID: $GITEE_RELEASE_ID)"
          else
            echo "❌ 创建Release失败: $CREATE_RESULT"
            exit 1
          fi
          
          # 关键修复：等待Gitee后端同步 + 重新获取有效的Release ID
          echo "⏳ 等待Gitee数据同步..."
          sleep 5
          
          # 重新查询确认Release存在
          VALIDATE_RESULT=$(curl -s -H "Authorization: token $GITEE_TOKEN" \
            "$GITEE_API/releases/tags/$RELEASE_TAG")
          
          if ! echo "$VALIDATE_RESULT" | jq -e '.id' >/dev/null 2>&1; then
            echo "❌ Release创建后未同步，无法继续"
            exit 1
          fi
          
          # 使用重新查询到的ID（避免创建时的临时ID失效）
          GITEE_RELEASE_ID=$(echo "$VALIDATE_RESULT" | jq -r '.id')
          echo "✅ 确认Release有效 (最终ID: $GITEE_RELEASE_ID)"
          
          # ==============================
          # 3. 上传APK附件（修复404核心）
          # ==============================
          if [ "$ASSET_COUNT" -eq 0 ]; then
            echo "🎉 同步完成（无附件）"
            exit 0
          fi
          
          echo "📦 开始上传APK附件..."
          jq -c '.assets[]' release_info.json | while read -r asset; do
            ASSET_NAME=$(echo "$asset" | jq -r '.name')
            ASSET_CONTENT_TYPE=$(echo "$asset" | jq -r '.contentType')
          
            echo "======================"
            echo "   处理文件: $ASSET_NAME"
          
            # 下载APK
            echo "   🔽 下载APK..."
            gh release download "$RELEASE_TAG" \
              --repo "mayixuanemail-web/lulema" \
              --pattern "$ASSET_NAME" \
              --output "$ASSET_NAME" \
              --clobber
          
            if [ ! -f "$ASSET_NAME" ]; then
              echo "   ❌ 下载失败，跳过"
              continue
            fi
          
            # 核心修复：使用Gitee官方推荐的附件上传API格式
            UPLOAD_URL="$GITEE_API/releases/$GITEE_RELEASE_ID/assets"
            echo "   🔼 上传到: $UPLOAD_URL"
          
            # 上传（带详细调试）
            for i in {1..3}; do
              echo "   上传尝试 $i/3..."
              UPLOAD_RESPONSE=$(curl -v -s -X POST \
                -H "Authorization: token $GITEE_TOKEN" \
                -F "file=@$ASSET_NAME" \
                -F "name=$ASSET_NAME" \
                "$UPLOAD_URL")
          
              # 检查上传结果
              if echo "$UPLOAD_RESPONSE" | jq -e '.id' >/dev/null 2>&1; then
                echo "   ✅ 上传成功！ID: $(echo "$UPLOAD_RESPONSE" | jq -r '.id')"
                break
              elif [ $i -eq 3 ]; then
                echo "   ❌ 上传失败（3次重试耗尽）"
                echo "   响应内容: $UPLOAD_RESPONSE"
              else
                echo "   ⚠️  上传失败，5秒后重试..."
                sleep 5
              fi
            done
          
            rm -f "$ASSET_NAME"
          done
          
          echo "======================"
          echo "🎉 全部同步完成！"
          echo "   Gitee Release地址: https://gitee.com/mayixuanemail-web/lulema/releases/tag/$RELEASE_TAG"