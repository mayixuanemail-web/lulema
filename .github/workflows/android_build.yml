name: Android Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode release keystore
        if: github.event_name == 'push'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/keystore"
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is empty. Please add it in GitHub Secrets." >&2
            exit 1
          fi
          CLEAN_B64=$(printf "%s" "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')
          printf "%s" "$CLEAN_B64" | base64 -d > "$HOME/keystore/release.jks" 2>/dev/null || \
          printf "%s" "$CLEAN_B64" | base64 --decode > "$HOME/keystore/release.jks"
          test -s "$HOME/keystore/release.jks"
          echo "Keystore written to $HOME/keystore/release.jks"
          ls -l "$HOME/keystore/release.jks"

      - name: Export ANDROID_KEYSTORE_PATH
        if: github.event_name == 'push'
        run: echo "ANDROID_KEYSTORE_PATH=$HOME/keystore/release.jks" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug -PversionCode=${{ github.run_number }}

      - name: Build Release APK (Signed)
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Release APK
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'push'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag to Gitee
        if: github.event_name == 'push'
        env:
          GITEE_USER: ${{ secrets.GITEE_USER }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          TAG_NAME: v1.0.${{ github.run_number }}
        run: |
          git config --global user.email "ci-bot@example.com"
          git config --global user.name "ci-bot"
          git remote add gitee https://$GITEE_USER:$GITEE_TOKEN@gitee.com/$GITEE_USER/$GITEE_REPO.git
          git fetch origin $TAG_NAME --tags
          git push gitee $TAG_NAME --tags

      - name: Sync Release to Gitee
        if: github.event_name == 'push'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          TAG_NAME: v1.0.${{ github.run_number }}
        run: |
          RELEASE_NAME="Release v1.0.${{ github.run_number }}"
          RELEASE_BODY="自动同步自 GitHub Release。"

          JSON=$(jq -n \
            --arg access_token "$GITEE_TOKEN" \
            --arg tag_name "$TAG_NAME" \
            --arg name "$RELEASE_NAME" \
            --arg body "$RELEASE_BODY" \
            --arg target_commitish "main" \
            '{access_token: $access_token, tag_name: $tag_name, name: $name, body: $body, prerelease: false, target_commitish: $target_commitish}')

          curl -X POST "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases" \
            -H "Content-Type: application/json" \
            -d "$JSON"

      - name: Upload APK to Gitee Release
        if: github.event_name == 'push'
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          TAG_NAME: v1.0.${{ github.run_number }}
        run: |
          set -e
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          # 先查 tag 是否已存在 release
          RELEASE_ID=$(curl -s "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$TAG_NAME?access_token=$GITEE_TOKEN" | jq -r '.id')
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            # 不存在则创建
            RELEASE_NAME="Release $TAG_NAME"
            RELEASE_BODY="自动同步自 GitHub Release。"
            JSON=$(jq -n \
              --arg access_token "$GITEE_TOKEN" \
              --arg tag_name "$TAG_NAME" \
              --arg name "$RELEASE_NAME" \
              --arg body "$RELEASE_BODY" \
              --arg target_commitish "main" \
              '{access_token: $access_token, tag_name: $tag_name, name: $name, body: $body, prerelease: false, target_commitish: $target_commitish}')
            RESPONSE=$(curl -s -X POST "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases" \
              -H "Content-Type: application/json" \
              -d "$JSON")
            echo "Gitee create release response: $RESPONSE"
            RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          fi
          # 再重试查 id（防止延迟）
          for i in {1..5}; do
            RESP=$(curl -s "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$TAG_NAME?access_token=$GITEE_TOKEN")
            echo "Gitee API response: $RESP"
            RELEASE_ID=$(echo "$RESP" | jq -r '.id')
            if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
              break
            fi
            echo "Release id not found, retrying in 3s... ($i/5)"
            sleep 3
          done
          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "Failed to get Gitee release id for tag $TAG_NAME" >&2
            exit 1
          fi
          # 上传 APK
          curl -X POST "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/$RELEASE_ID/assets?access_token=$GITEE_TOKEN" \
            -F "attachment=@$APK_PATH"
