name: Sync Release to Gitee
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  sync-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: sudo apt install gh

      - name: Get GitHub Release Info
        id: get_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release view $TAG --json tagName,name,body,assets > release.json
          echo "tag_name=$(jq -r .tagName release.json)" >> $GITHUB_OUTPUT
          echo "release_name=$(jq -r .name release.json)" >> $GITHUB_OUTPUT
          echo "body=$(jq -r .body release.json)" >> $GITHUB_OUTPUT

      - name: Sync to Gitee Release
        uses: nicennnnnnnlee/action-gitee-release@v2.0.0
        with:
          gitee_action: create_release
          gitee_owner: mayixuanemail-web
          gitee_repo: lulema
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_tag_name: ${{ steps.get_release.outputs.tag_name }}
          gitee_release_name: ${{ steps.get_release.outputs.release_name }}
          gitee_body: ${{ steps.get_release.outputs.body }}
          gitee_upload_assets: true