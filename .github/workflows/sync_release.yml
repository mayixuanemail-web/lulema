name: Sync APK to Gitee Release
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (leave blank for latest)'
        required: false

jobs:
  sync-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq curl

      - name: Get Release Tag
        id: get_tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download APK assets from GitHub Release
        id: download_apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get_tag.outputs.tag }}"
          mkdir -p apk_assets
          gh release view "$TAG" --json assets > assets.json
          APK_COUNT=0
          for url in $(jq -r '.assets[] | select(.name | endswith(".apk")) | .url' assets.json); do
            name=$(jq -r ".assets[] | select(.url == \"$url\") | .name" assets.json)
            echo "Downloading $name ..."
            gh release download "$TAG" --pattern "$name" --dir apk_assets
            APK_COUNT=$((APK_COUNT+1))
          done
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "No APK found in release!" >&2
            exit 1
          fi

      - name: Ensure Gitee Release exists and get Release ID
        id: gitee_release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -e
          OWNER=mayixuanemail-web
          REPO=lulema
          TAG="${{ steps.get_tag.outputs.tag }}"
          API_URL="https://gitee.com/api/v5/repos/$OWNER/$REPO"
          # Try to get release
          RESP=$(curl -s "$API_URL/releases/tags/$TAG?access_token=$GITEE_TOKEN")
          RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            # Create release
            CREATE_RESP=$(curl -s -X POST "$API_URL/releases?access_token=$GITEE_TOKEN" \
              -d "tag_name=$TAG" \
              -d "name=$TAG" \
              -d "body=Auto release from GitHub Actions" \
              -d "target_commitish=master")
            RELEASE_ID=$(echo "$CREATE_RESP" | jq -r '.id // empty')
            if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
              echo "Failed to create Gitee release!" >&2
              echo "$CREATE_RESP"
              exit 1
            fi
          fi
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload APK(s) to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -e
          OWNER=mayixuanemail-web
          REPO=lulema
          RELEASE_ID=${{ steps.gitee_release.outputs.release_id }}
          API_URL="https://gitee.com/api/v5/repos/$OWNER/$REPO/releases/$RELEASE_ID/attachments"
          for apk in apk_assets/*.apk; do
            [ -e "$apk" ] || continue
            echo "Uploading $apk ..."
            RESP=$(curl -s -X POST "$API_URL?access_token=$GITEE_TOKEN" \
              -F "name=$(basename $apk)" \
              -F "attachment=@$apk;type=application/vnd.android.package-archive")
            if ! echo "$RESP" | grep -q '"name"'; then
              echo "Failed to upload $apk! Response: $RESP" >&2
              exit 1
            fi
          done
          echo "All APK(s) uploaded to Gitee Release $RELEASE_ID."
