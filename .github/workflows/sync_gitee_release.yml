name: Sync Release to Gitee

on:
  release:
    types: [published]

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/download-release-asset@v1
        with:
          repository: ${{ github.repository }}
          tag: ${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ./release-assets

      - name: Sync Release to Gitee
        env:
          GITEE_TOKEN: 0663baeb420216e2d8b069b619cd4cf1
          GITEE_REPO: mayixuanemail-web/lulema
          GITEE_OWNER: mayixuanemail-web
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # 上传 Release 到 Gitee
          curl -X POST "https://gitee.com/api/v5/repos/${GITEE_REPO}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${GITEE_TOKEN}\",
              \"tag_name\": \"${RELEASE_TAG}\",
              \"name\": \"${RELEASE_NAME}\",
              \"body\": \"${RELEASE_BODY}\"
            }"

      - name: Upload Release Assets to Gitee
        env:
          GITEE_TOKEN: 0663baeb420216e2d8b069b619cd4cf1
          GITEE_REPO: mayixuanemail-web/lulema
          GITEE_OWNER: mayixuanemail-web
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          for file in ./release-assets/*; do
            curl -X POST "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/assets" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "tag_name=${RELEASE_TAG}" \
              -F "name=$(basename $file)" \
              -F "attachment=@$file";
          done
